name: Delete Untagged Images

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  clean-ghcr:
    runs-on: ubuntu-latest

    permissions:
      packages: write

    steps:
      - name: ghcr.io cleanup action
        uses: dataaxiom/ghcr-cleanup-action@34a2b6c814b9c6bcb92f78cba3e56a7ab9ca7a86 # v1
        with:
          delete-untagged: true
          delete-ghost-images: true
          older-than: 3 months
          keep-n-tagged: 10
