name: Delete Untagged Images

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  clean-ghcr:
    runs-on: ubuntu-latest

    permissions:
      packages: write

    steps:
      - name: ghcr.io cleanup action
        uses: dataaxiom/ghcr-cleanup-action@f092b48ba3b604b2a83690dc4b2bbb3392e1045f # v1
        with:
          delete-untagged: true
          delete-ghost-images: true
          older-than: 3 months
          keep-n-tagged: 10
