name: Unit Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - '**/Dockerfile'
      - '**/*.Dockerfile'
      - '**/*.md'
      - '.github/workflows/test.yaml'
      - 'versions.env'

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Read hadolint version
        id: hadolint-version
        run: |
          version="$(awk -F= '/^HADOLINT_VERSION=/{print $2}' versions.env)"
          if [ -z "$version" ]; then
            echo "Failed to read HADOLINT_VERSION from versions.env" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install hadolint
        env:
          HADOLINT_VERSION: ${{ steps.hadolint-version.outputs.version }}
        run: |
          curl -Lo /usr/local/bin/hadolint \
            "https://github.com/hadolint/hadolint/releases/download/${HADOLINT_VERSION}/hadolint-Linux-x86_64"
          chmod +x /usr/local/bin/hadolint

      - name: Running Tests
        run: |
          go mod tidy
          make test
